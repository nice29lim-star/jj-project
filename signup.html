<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JJ Project - 회원가입</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="login-container">
  <div class="login-box">
    <div class="login-logo">📝</div>
    <h1>회원가입</h1>
    <p>JJ Project에 오신 것을 환영합니다!</p>

    <div class="email-login-form" style="margin-top:20px;">
      <input type="text" id="signupName" placeholder="이름 (닉네임)" class="input-field" style="width:100%; margin-bottom:10px; padding:12px; border-radius:8px; border:1px solid #ddd;">
      <input type="email" id="signupEmail" placeholder="이메일" class="input-field" style="width:100%; margin-bottom:10px; padding:12px; border-radius:8px; border:1px solid #ddd;">
      <input type="password" id="signupPassword" placeholder="비밀번호 (6자 이상)" class="input-field" style="width:100%; margin-bottom:15px; padding:12px; border-radius:8px; border:1px solid #ddd;">
      <button class="btn btn-primary" style="width:100%; padding:12px; font-size:1rem; border-radius:8px;" onclick="signUpWithEmail()">가입하기</button>
    </div>

    <div style="margin-top:20px; text-align:center; font-size:0.9rem;">
      이미 계정이 있으신가요? <a href="index.html" style="color:#4F46E5; text-decoration:none; font-weight:bold;">로그인</a>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
