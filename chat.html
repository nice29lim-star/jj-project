<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JJ Project - 채팅</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- 네비게이션 -->
<nav class="navbar">
  <a href="chat.html" class="logo">💬 JJ Project</a>
  <div class="nav-links">
    <a href="chat.html" class="active">💬 채팅</a>
    <a href="gallery.html">🖼️ 갤러리</a>
    <a href="schedule.html">📅 일정</a>
  </div>
  <div class="user-info">
    <img id="userAvatar" src="" alt="avatar">
    <span id="userName"></span>
    <button class="btn-logout" onclick="signOut()">로그아웃</button>
  </div>
</nav>

<!-- 메인 -->
<div class="container">
  <div class="chat-container">

    <!-- 채팅방 목록 -->
    <div class="room-list">
      <div class="room-list-header">
        <span>채팅방</span>
        <button class="btn btn-primary" style="padding:6px 12px; font-size:0.8rem;" onclick="openModal('createRoomModal')">+ 새 방</button>
      </div>
      <div id="roomList">
        <p style="color:#9ca3af; text-align:center; padding:20px; font-size:0.85rem;">로딩 중...</p>
      </div>
    </div>

    <!-- 채팅 영역 -->
    <div class="chat-box">
      <div class="chat-header" id="currentRoomName">
        채팅방을 선택해주세요
      </div>

      <div class="chat-messages" id="chatMessages">
        <div class="chat-empty">
          <div style="font-size:3rem;">💬</div>
          <p>채팅방을 선택하면 대화를 시작할 수 있어요</p>
        </div>
      </div>

      <div class="chat-input" id="chatInputArea" style="display:none;">
        <input
          type="text"
          id="messageInput"
          placeholder="메시지를 입력하세요... (Enter로 전송)"
          onkeypress="handleKeyPress(event)"
        >
        <button class="btn btn-primary" onclick="sendMessage()">전송</button>
      </div>
    </div>

  </div>
</div>

<!-- 채팅방 만들기 모달 -->
<div class="modal-overlay" id="createRoomModal">
  <div class="modal">
    <h2>💬 새 채팅방 만들기</h2>
    <div class="form-group">
      <label>채팅방 이름 *</label>
      <input type="text" id="roomName" placeholder="채팅방 이름을 입력하세요">
    </div>
    <div class="form-group">
      <label>설명 (선택)</label>
      <input type="text" id="roomDescription" placeholder="채팅방 설명을 입력하세요">
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('createRoomModal')">취소</button>
      <button class="btn btn-primary" onclick="createRoom()">만들기</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/chat.js"></script>
</body>
</html>
