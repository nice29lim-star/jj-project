<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JJ Project - 승인 대기중</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="login-container">
  <div class="login-box" style="text-align:center;">
    <div class="login-logo" style="margin-bottom:20px; font-size:4rem;">⏳</div>
    <h1 style="color:#4F46E5;">가입 승인 대기중</h1>
    <p style="margin:20px 0; color:#4b5563; line-height:1.6;">
      회원가입이 완료되었습니다!<br>
      현재 관리자의 승인을 기다리고 있습니다.<br>
      승인이 완료되면 모든 기능을 정상적으로 이용하실 수 있습니다.
    </p>

    <button class="btn btn-secondary" style="margin-top:20px; padding:10px 20px;" onclick="signOutAndGoBack()">
      다른 계정으로 로그인하기 (로그아웃)
    </button>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="js/config.js"></script>
<script>
  async function signOutAndGoBack() {
    await supabaseClient.auth.signOut();
    window.location.href = 'index.html';
  }
</script>
</body>
</html>
